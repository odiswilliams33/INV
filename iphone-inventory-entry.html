<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Inventory Entry">
<title>Inventory Entry Mobile</title>
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
<style>
:root{--bg:#f3f4f6;--card:#fff;--ink:#1f2937;--muted:#6b7280;--line:#d1d5db;--blue:#1f4f7a;--green:#17803d;--red:#b42318;--soft:#eef2f7}*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}body{padding-bottom:92px}.top{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#1f4f7a,#202938);color:#fff;padding:calc(14px + env(safe-area-inset-top)) 16px 14px;box-shadow:0 2px 8px rgba(0,0,0,.2)}.top h1{font-size:20px;margin:0;font-weight:800}.top p{font-size:12px;margin:4px 0 0;opacity:.85}.wrap{padding:14px;max-width:680px;margin:0 auto}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:9px 10px calc(9px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid var(--line);backdrop-filter:blur(10px)}.tab{border:1px solid var(--line);background:#fff;color:var(--blue);border-radius:13px;padding:10px 6px;font-size:12px;font-weight:800}.tab.active{background:var(--blue);color:#fff;border-color:var(--blue)}.screen{display:none}.screen.active{display:block}.card{background:var(--card);border:1px solid #e5e7eb;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}h2{font-size:18px;margin:0 0 12px}label{display:block;font-size:13px;font-weight:800;margin:12px 0 6px;color:#374151}input,select,textarea{width:100%;font:inherit;font-size:16px;padding:12px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(31,79,122,.12)}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{appearance:none;border:0;border-radius:12px;padding:12px 14px;font-weight:800;font-size:15px;background:var(--blue);color:white;box-shadow:0 1px 3px rgba(0,0,0,.15)}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.gray{background:#4b5563}.btn.light{background:#fff;color:var(--blue);border:1.5px solid var(--line);box-shadow:none}.btn.full{width:100%}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{background:var(--soft);border-radius:13px;padding:11px;text-align:center}.stat b{display:block;font-size:18px}.stat span{font-size:11px;color:var(--muted);font-weight:700}.item{border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin-bottom:10px;background:#fff}.item-top{display:flex;justify-content:space-between;gap:8px}.sku{font-size:16px;font-weight:900;color:var(--blue)}.title{font-weight:800;margin:5px 0}.meta{font-size:12px;color:var(--muted);display:flex;gap:9px;flex-wrap:wrap}.preview{font-size:13px;color:#374151;margin-top:8px;max-height:60px;overflow:hidden}.ql-toolbar.ql-snow{border:1.5px solid var(--line);border-radius:12px 12px 0 0;background:#f9fafb}.ql-container.ql-snow{border:1.5px solid var(--line);border-top:0;border-radius:0 0 12px 12px;font-family:inherit;font-size:15px}.ql-editor{min-height:170px}.ql-snow .ql-picker.ql-size .ql-picker-label[data-value="10px"]::before,.ql-snow .ql-picker.ql-size .ql-picker-item[data-value="10px"]::before{content:"10"}.ql-snow .ql-picker.ql-size .ql-picker-label[data-value="12px"]::before,.ql-snow .ql-picker.ql-size .ql-picker-item[data-value="12px"]::before{content:"12"}.ql-snow .ql-picker.ql-size .ql-picker-label[data-value="14px"]::before,.ql-snow .ql-picker.ql-size .ql-picker-item[data-value="14px"]::before{content:"14"}.ql-snow .ql-picker.ql-size .ql-picker-label[data-value="16px"]::before,.ql-snow .ql-picker.ql-size .ql-picker-item[data-value="16px"]::before{content:"16"}.ql-snow .ql-picker.ql-size .ql-picker-label[data-value="18px"]::before,.ql-snow .ql-picker.ql-size .ql-picker-item[data-value="18px"]::before{content:"18"}.ql-snow .ql-picker.ql-size .ql-picker-label[data-value="24px"]::before,.ql-snow .ql-picker.ql-size .ql-picker-item[data-value="24px"]::before{content:"24"}.empty{text-align:center;color:var(--muted);padding:30px 12px}.notice{font-size:13px;color:#374151;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:10px}.toast{position:fixed;left:12px;right:12px;bottom:88px;background:#111827;color:#fff;padding:12px 14px;border-radius:13px;font-size:14px;font-weight:700;display:none;z-index:30;text-align:center}.hidden{display:none!important}@media(max-width:390px){.row{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.btn{font-size:14px;padding:11px 12px}}
</style>
</head>
<body>
<header class="top"><h1>📦 Inventory Entry</h1><p>Mobile entry app · exports inventory/templates JSON for desktop import</p></header>
<main class="wrap">
<section id="inventory" class="screen active">
  <div class="card summary"><div class="stat"><b id="countItems">0</b><span>Items</span></div><div class="stat"><b id="countQty">0</b><span>Qty</span></div><div class="stat"><b id="countCost">$0</b><span>Cost</span></div></div>
  <div class="card"><input id="search" placeholder="Search SKU, title, vendor..." oninput="renderInventory()"><div class="btnrow"><button class="btn green" onclick="exportInventory()">Export Inventory JSON</button><button class="btn light" onclick="document.getElementById('importFile').click()">Import JSON</button><input id="importFile" type="file" accept="application/json,.json" class="hidden" onchange="importJson(event)"></div></div>
  <div id="inventoryList"></div>
</section>
<section id="add" class="screen">
  <div class="card"><h2 id="formTitle">Add Item</h2><form id="itemForm">
    <label>SKU *</label><input id="sku" required autocomplete="off">
    <label>Vendor</label><input id="vendor" autocomplete="off">
    <label>Title *</label><input id="title" required>
    <div class="row"><div><label>Quantity *</label><input id="quantity" type="number" min="0" required></div><div><label>Cost Each *</label><input id="cost" type="number" min="0" step="0.01" required></div></div>
    <div class="row"><div><label>Purchase Date *</label><input id="purchaseDate" type="date" required></div><div><label>List Price</label><input id="listPrice" type="number" min="0" step="0.01"></div></div>
    <label>Insert Template</label><select id="templateSelect" onchange="insertTemplate()"><option value="">-- Select template --</option></select>
    <label>Listing Description</label><div id="descriptionEditor"></div>
    <div class="btnrow"><button class="btn green" type="submit">Save Item</button><button class="btn light" type="button" onclick="clearItemForm()">Clear</button></div>
  </form></div>
</section>
<section id="templates" class="screen">
  <div class="card"><h2 id="templateTitle">Create Template</h2><form id="templateForm"><label>Template Name *</label><input id="templateName" required><label>Template Content *</label><div id="templateEditor"></div><div class="btnrow"><button class="btn green" type="submit">Save Template</button><button class="btn light" type="button" onclick="cancelTemplateEdit()">Clear</button></div></form></div>
  <div class="card"><div class="btnrow"><button class="btn green" onclick="exportTemplates()">Export Templates JSON</button><button class="btn gray" onclick="exportAll()">Export All</button></div></div>
  <div id="templateList"></div>
  <div class="notice">Rich text is saved as HTML in the same fields your desktop app uses: item <b>description</b> and template <b>content</b>.</div>
</section>
</main>
<nav class="tabs"><button class="tab active" data-screen="inventory">Inventory</button><button class="tab" data-screen="add">Add Item</button><button class="tab" data-screen="templates">Templates</button></nav>
<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script>
let inventory=[], templates=[], editingItemId=null, editingTemplateId=null, descriptionEditor, templateEditor;
const toolbar=[[{'size':['10px','12px','14px','16px','18px','24px']}],['bold','italic','underline','strike'],[{'list':'ordered'},{'list':'bullet'}],[{'color':[]},{'background':[]}],['clean']];
function safeParse(k){try{return JSON.parse(localStorage.getItem(k)||'[]')}catch{return[]}}
function save(){localStorage.setItem('inventory',JSON.stringify(inventory));localStorage.setItem('templates',JSON.stringify(templates));renderAll()}
function money(n){return '$'+Number(n||0).toFixed(2)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function strip(html){const d=document.createElement('div');d.innerHTML=html||'';return d.textContent||''}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.style.display='none',2200)}
function init(){inventory=safeParse('inventory');templates=safeParse('templates');descriptionEditor=new Quill('#descriptionEditor',{modules:{toolbar},theme:'snow',placeholder:'Enter formatted listing description...'});templateEditor=new Quill('#templateEditor',{modules:{toolbar},theme:'snow',placeholder:'Create reusable formatted text...'});document.getElementById('purchaseDate').valueAsDate=new Date();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>showScreen(b.dataset.screen));document.getElementById('itemForm').onsubmit=saveItem;document.getElementById('templateForm').onsubmit=saveTemplate;renderAll()}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.screen===id));window.scrollTo({top:0,behavior:'smooth'})}
function renderAll(){renderInventory();renderTemplates();populateTemplates()}
function renderInventory(){const q=(document.getElementById('search')?.value||'').toLowerCase();const list=document.getElementById('inventoryList');let rows=inventory.filter(i=>[i.sku,i.title,i.vendor,strip(i.description)].join(' ').toLowerCase().includes(q));document.getElementById('countItems').textContent=inventory.length;document.getElementById('countQty').textContent=inventory.reduce((s,i)=>s+Number(i.quantity||0),0);document.getElementById('countCost').textContent=money(inventory.reduce((s,i)=>s+Number(i.quantity||0)*Number(i.cost||0),0));if(!rows.length){list.innerHTML='<div class="card empty">No inventory items yet.</div>';return}list.innerHTML=rows.slice().reverse().map(i=>`<div class="item"><div class="item-top"><div><div class="sku">${esc(i.sku)}</div><div class="title">${esc(i.title)}</div></div><div class="meta">Qty ${esc(i.quantity)}</div></div><div class="meta"><span>${esc(i.vendor||'No vendor')}</span><span>${money(i.cost)} each</span><span>${esc(i.purchaseDate||'')}</span></div>${i.description?`<div class="preview">${i.description}</div>`:''}<div class="btnrow"><button class="btn light" onclick="editItem(${i.id})">Edit</button><button class="btn red" onclick="deleteItem(${i.id})">Delete</button></div></div>`).join('')}
function saveItem(e){e.preventDefault();const sku=document.getElementById('sku').value.trim();if(!sku)return;const duplicate=inventory.some(i=>String(i.sku).toLowerCase()===sku.toLowerCase()&&i.id!==editingItemId);if(duplicate){toast('SKU already exists');return}const item={id:editingItemId||Date.now(),sku,vendor:document.getElementById('vendor').value.trim(),quantity:Number(document.getElementById('quantity').value||0),title:document.getElementById('title').value.trim(),description:descriptionEditor.root.innerHTML,cost:Number(document.getElementById('cost').value||0),purchaseDate:document.getElementById('purchaseDate').value,listPrice:document.getElementById('listPrice').value?Number(document.getElementById('listPrice').value):null,createdAt:new Date().toISOString()};if(editingItemId){inventory=inventory.map(i=>i.id===editingItemId?{...i,...item,updatedAt:new Date().toISOString()}:i);toast('Item updated')}else{inventory.push(item);toast('Item saved')}clearItemForm();save();showScreen('inventory')}
function editItem(id){const i=inventory.find(x=>x.id===id);if(!i)return;editingItemId=id;document.getElementById('formTitle').textContent='Edit Item';sku.value=i.sku||'';vendor.value=i.vendor||'';title.value=i.title||'';quantity.value=i.quantity??'';cost.value=i.cost??'';purchaseDate.value=i.purchaseDate||'';listPrice.value=i.listPrice??'';descriptionEditor.root.innerHTML=i.description||'';showScreen('add')}
function deleteItem(id){if(confirm('Delete this item?')){inventory=inventory.filter(i=>i.id!==id);save();toast('Deleted')}}
function clearItemForm(){editingItemId=null;document.getElementById('formTitle').textContent='Add Item';document.getElementById('itemForm').reset();descriptionEditor.setContents([]);document.getElementById('purchaseDate').valueAsDate=new Date()}
function populateTemplates(){const s=document.getElementById('templateSelect');s.innerHTML='<option value="">-- Select template --</option>'+templates.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}
function insertTemplate(){const id=Number(document.getElementById('templateSelect').value);const t=templates.find(x=>x.id===id);if(!t)return;descriptionEditor.clipboard.dangerouslyPasteHTML(descriptionEditor.getLength()-1,t.content||'');document.getElementById('templateSelect').value='';toast('Template inserted')}
function renderTemplates(){const list=document.getElementById('templateList');if(!templates.length){list.innerHTML='<div class="card empty">No templates saved yet.</div>';return}list.innerHTML=templates.slice().reverse().map(t=>`<div class="item"><div class="item-top"><div><div class="sku">${esc(t.name)}</div><div class="preview">${t.content||''}</div></div></div><div class="btnrow"><button class="btn light" onclick="editTemplate(${t.id})">Edit</button><button class="btn red" onclick="deleteTemplate(${t.id})">Delete</button></div></div>`).join('')}
function saveTemplate(e){e.preventDefault();const name=document.getElementById('templateName').value.trim();const content=templateEditor.root.innerHTML;if(!name)return;const t={id:editingTemplateId||Date.now(),name,content,createdAt:new Date().toISOString()};if(editingTemplateId){templates=templates.map(x=>x.id===editingTemplateId?{...x,...t,updatedAt:new Date().toISOString()}:x);toast('Template updated')}else{templates.push(t);toast('Template saved')}cancelTemplateEdit();save()}
function editTemplate(id){const t=templates.find(x=>x.id===id);if(!t)return;editingTemplateId=id;document.getElementById('templateTitle').textContent='Edit Template';templateName.value=t.name||'';templateEditor.root.innerHTML=t.content||'';showScreen('templates')}
function cancelTemplateEdit(){editingTemplateId=null;document.getElementById('templateTitle').textContent='Create Template';document.getElementById('templateForm').reset();if(templateEditor)templateEditor.setContents([])}
function deleteTemplate(id){if(confirm('Delete this template?')){templates=templates.filter(t=>t.id!==id);save();toast('Template deleted')}}
function downloadJSON(data,filename){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),500);toast('Export started')}
function exportInventory(){downloadJSON(inventory,'inventory-export.json')}
function exportTemplates(){downloadJSON(templates,'templates-export.json')}
function exportAll(){downloadJSON({inventory,sales:[],templates},'mobile-inventory-full-export.json')}
function importJson(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(Array.isArray(data)){if(data[0]?.content)templates=[...templates,...data];else inventory=[...inventory,...data]}else{if(Array.isArray(data.inventory))inventory=[...inventory,...data.inventory];if(Array.isArray(data.templates))templates=[...templates,...data.templates]}save();toast('Imported JSON')}catch(e){toast('Import failed: bad JSON')}ev.target.value=''};r.readAsText(f)}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
